<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="css/style.css">

<style>

.login-container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    background:white;
    width:400px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(255,105,180,.2);
}

.login-card h1{
    color:#d63384;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:2px solid #ffd6e7;
    border-radius:15px;
}

button{
    width:100%;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="login-container">

<div class="login-card">

<h1>🌸 Login User</h1>

<input type="text" id="nama" placeholder="Masukkan Nama">

<input type="email" placeholder="Masukkan Email">

<button onclick="login()">
Masuk
</button>

</div>

</div>

<script>

function login(){

let nama =
document.getElementById("nama").value;

if(nama==""){
alert("Masukkan nama terlebih dahulu!");
return;
}

localStorage.setItem("namaUser",nama);

window.location.href="fenomena.html";

}

</script>

</body>
</html>
